<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALTV - Social Links</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --purple: #a020f0;
    --purple-glow: #bf5fff;
    --purple-dim: #6b0fa8;
    --bg: #0a0a0a;
    --card-bg: rgba(20, 0, 35, 0.75);
    --border: #3a0a5a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #fff;
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse 70% 50% at 50% 0%,   rgba(160,32,240,0.28) 0%, transparent 55%),
      radial-gradient(ellipse 55% 45% at 15% 50%,  rgba(120,0,200,0.16) 0%, transparent 55%),
      radial-gradient(ellipse 55% 45% at 85% 50%,  rgba(120,0,200,0.16) 0%, transparent 55%),
      radial-gradient(ellipse 60% 40% at 50% 100%, rgba(100,0,180,0.14) 0%, transparent 55%),
      linear-gradient(180deg, #0a0a0a 0%, #100018 30%, #0a0a0a 70%, #0a0a0a 100%);
    pointer-events: none;
  }

  
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    background-image:
      linear-gradient(rgba(160,32,240,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(160,32,240,0.07) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 8s linear infinite;
    pointer-events: none;
  }

  
  .banner, .profile-wrap, .container, footer {
    position: relative;
    z-index: 1;
  }

  
  .banner {
    width: 100%;
    height: 320px;
    background: #0a0a0a;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding-bottom: 0;
  }

  .banner-bg-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    opacity: 0.85;
  }

  
  .banner-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.35);
  }

  .banner::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--purple), transparent);
    box-shadow: 0 0 16px var(--purple);
  }

  @keyframes gridMove {
    0%   { background-position: 0 0; }
    100% { background-position: 50px 50px; }
  }

 
  .profile-wrap {
    position: relative;
    z-index: 10;
    display: flex;
    justify-content: center;
    margin-top: 20px;
  }

  .profile-logo {
    width: 80px;
    height: 80px;
    border-radius: 20px;
    border: 2.5px solid var(--purple);
    box-shadow: 0 0 20px rgba(160,32,240,0.8), 0 0 50px rgba(160,32,240,0.3);
    background: #050005;
    display: block;
    object-fit: cover;
    overflow: hidden;
  }

  
  .container {
    max-width: 600px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  
  .section-title {
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    color: rgba(255,255,255,0.6);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin: 36px 0 24px;
    position: relative;
  }

  .section-title::before,
  .section-title::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--purple));
  }

  .section-title::before { right: calc(50% + 100px); background: linear-gradient(90deg, transparent, var(--purple)); }
  .section-title::after  { left:  calc(50% + 100px); background: linear-gradient(90deg, var(--purple), transparent); }

 
  .social-grid {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .social-card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 20px;
    text-decoration: none;
    color: #fff;
    position: relative;
    overflow: hidden;
    transition: border-color 0.25s, transform 0.2s, box-shadow 0.25s;
    cursor: pointer;
    min-height: 88px;
  }

  .social-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(160,32,240,0.08) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .social-card:hover {
    border-color: var(--purple);
    transform: translateY(-2px) scale(1.01);
    box-shadow: 0 8px 32px rgba(160,32,240,0.25), 0 0 0 1px rgba(160,32,240,0.15);
  }

  .social-card:hover::before { opacity: 1; }

  .social-card:active { transform: scale(0.99); }

  
  .social-thumb {
    width: 56px;
    height: 80px;
    border-radius: 10px;
    object-fit: cover;
    flex-shrink: 0;
    border: 1px solid rgba(160,32,240,0.3);
  }

  
  .platform-icon {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
    object-fit: contain;
  }

  .card-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .card-platform {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--purple-glow);
  }

  .card-title {
    font-size: 17px;
    font-weight: 700;
    color: #fff;
  }

  .card-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
  }

  .card-arrow {
    font-size: 20px;
    color: var(--purple);
    flex-shrink: 0;
    transition: transform 0.2s;
  }

  .social-card:hover .card-arrow { transform: translateX(-4px); }

  
  .add-more-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 18px;
    margin-top: 10px;
    background: transparent;
    border: 2px dashed rgba(160,32,240,0.35);
    border-radius: 16px;
    color: rgba(255,255,255,0.35);
    font-size: 15px;
    font-family: 'Tajawal', sans-serif;
    cursor: pointer;
    transition: all 0.25s;
  }

  .add-more-btn:hover {
    border-color: var(--purple);
    color: var(--purple);
    background: rgba(160,32,240,0.05);
  }

  
  footer {
    text-align: center;
    color: rgba(255,255,255,0.15);
    font-size: 12px;
    padding: 20px;
    letter-spacing: 2px;
    border-top: 1px solid #1a1a1a;
    margin-top: 20px;
  }

  
  @media (max-width: 480px) {
    .banner { height: 260px; }
    .section-title::before, .section-title::after { width: 30px; }
  }

  @keyframes fadeInBtn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

  <div style="background:#111;border:1px solid #3a0a5a;border-radius:20px;padding:30px;width:90%;max-width:400px;display:flex;flex-direction:column;gap:14px;">
    <h3 style="font-family:'Tajawal',sans-serif;font-size:20px;font-weight:700;color:var(--purple);text-align:center;">إضافة حساب جديد</h3>
    <input id="inp-platform" placeholder="اسم المنصة (مثل: YouTube)" style="background:#1a1a1a;border:1px solid #3a0a5a;border-radius:10px;padding:12px 16px;color:#fff;font-family:'Tajawal',sans-serif;font-size:15px;outline:none;direction:rtl;">
    <input id="inp-handle" placeholder="اسم الحساب (@username)" style="background:#1a1a1a;border:1px solid #3a0a5a;border-radius:10px;padding:12px 16px;color:#fff;font-family:'Tajawal',sans-serif;font-size:15px;outline:none;direction:rtl;">
    <input id="inp-url" placeholder="الرابط الكامل" style="background:#1a1a1a;border:1px solid #3a0a5a;border-radius:10px;padding:12px 16px;color:#fff;font-family:'Tajawal',sans-serif;font-size:15px;outline:none;direction:ltr;">
    <input id="inp-sub" placeholder="وصف قصير (اختياري)" style="background:#1a1a1a;border:1px solid #3a0a5a;border-radius:10px;padding:12px 16px;color:#fff;font-family:'Tajawal',sans-serif;font-size:15px;outline:none;direction:rtl;">
    <div style="display:flex;gap:10px;">
      <button onclick="saveCard()" style="flex:1;padding:13px;background:var(--purple);border:none;border-radius:10px;color:#fff;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:700;cursor:pointer;">حفظ</button>
      <button onclick="closeModal()" style="flex:1;padding:13px;background:#1a1a1a;border:1px solid #333;border-radius:10px;color:#aaa;font-family:'Tajawal',sans-serif;font-size:15px;cursor:pointer;">إلغاء</button>
    </div>
  </div>
</div>

<script>
  const SECRET = 'alrm';
  let keyBuffer = '';
  document.addEventListener('keydown', function(e) {
    keyBuffer += e.key.toLowerCase();
    if (keyBuffer.length > SECRET.length) keyBuffer = keyBuffer.slice(-SECRET.length);
    if (keyBuffer === SECRET) {
      const btn = document.getElementById('addBtn');
      btn.style.display = 'flex';
      btn.style.animation = 'fadeInBtn 0.4s ease';
      keyBuffer = '';
    }
  });

  function addCard() {
    document.getElementById('modal').style.display = 'flex';
  }
  function closeModal() {
    document.getElementById('modal').style.display = 'none';
    ['inp-platform','inp-handle','inp-url','inp-sub'].forEach(id => document.getElementById(id).value = '');
  }
  function saveCard() {
    const platform = document.getElementById('inp-platform').value.trim();
    const handle   = document.getElementById('inp-handle').value.trim();
    const url      = document.getElementById('inp-url').value.trim();
    const sub      = document.getElementById('inp-sub').value.trim() || 'تابعنا';
    if (!platform || !url) return;

    const card = document.createElement('a');
    card.className = 'social-card';
    card.href = url;
    card.target = '_blank';
    card.innerHTML = `
      <div style="width:56px;height:80px;border-radius:10px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;border:1px solid rgba(160,32,240,0.3);flex-shrink:0;font-size:22px;font-weight:900;color:var(--purple);font-family:'Tajawal',sans-serif;">${platform.charAt(0).toUpperCase()}</div>
      <div class="card-info">
        <span class="card-platform">${platform}</span>
        <span class="card-title">${handle || platform}</span>
        <span class="card-sub">${sub}</span>
      </div>
      <span class="card-arrow">←</span>
    `;
    document.getElementById('socialGrid').appendChild(card);
    closeModal();
  }

  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
</script>
</body>
</html>
